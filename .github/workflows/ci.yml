name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Format check (ruff)
        run: ruff format --check src tests
      - name: Type-check (mypy)
        run: mypy
      - name: Unit tests
        run: pytest -m "not integration and not slow"
      - name: Acceptance — six SRS scenarios
        run: pytest tests/acceptance -m acceptance
      - name: Validator report
        run: python -m cdmas.validator

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build
